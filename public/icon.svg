<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#bg-gradient)"/>

  <!-- Modern delivery truck icon -->
  <g transform="translate(90, 140)">
    <!-- Truck body -->
    <rect x="50" y="80" width="260" height="120" rx="8" fill="white" opacity="0.95"/>

    <!-- Truck cabin -->
    <path d="M 50 80 L 50 160 L 10 160 L 10 120 C 10 97 25 80 50 80 Z" fill="white" opacity="0.95"/>

    <!-- Windshield -->
    <path d="M 45 95 L 45 135 L 20 135 L 20 110 C 20 100 28 95 45 95 Z" fill="#3b82f6" opacity="0.5"/>

    <!-- Cargo area separator -->
    <line x1="170" y1="95" x2="170" y2="185" stroke="#2563eb" stroke-width="4"/>

    <!-- Side window -->
    <rect x="180" y="95" width="110" height="55" rx="4" fill="#3b82f6" opacity="0.5"/>

    <!-- Front wheel -->
    <circle cx="100" cy="200" r="32" fill="#1f2937"/>
    <circle cx="100" cy="200" r="18" fill="#4b5563"/>
    <circle cx="100" cy="200" r="8" fill="#9ca3af"/>

    <!-- Rear wheel -->
    <circle cx="260" cy="200" r="32" fill="#1f2937"/>
    <circle cx="260" cy="200" r="18" fill="#4b5563"/>
    <circle cx="260" cy="200" r="8" fill="#9ca3af"/>

    <!-- Speed lines -->
    <line x1="320" y1="110" x2="345" y2="110" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <line x1="320" y1="135" x2="340" y2="135" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <line x1="320" y1="160" x2="342" y2="160" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
