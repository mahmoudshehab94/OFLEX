<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg-gradient-maskable" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Full bleed background -->
  <rect width="512" height="512" fill="url(#bg-gradient-maskable)"/>

  <!-- Modern delivery truck icon (centered for safe zone) -->
  <g transform="translate(110, 160)">
    <!-- Truck body -->
    <rect x="40" y="60" width="220" height="100" rx="6" fill="white" opacity="0.95"/>

    <!-- Truck cabin -->
    <path d="M 40 60 L 40 135 L 5 135 L 5 100 C 5 77 18 60 40 60 Z" fill="white" opacity="0.95"/>

    <!-- Windshield -->
    <path d="M 36 73 L 36 115 L 15 115 L 15 88 C 15 80 22 73 36 73 Z" fill="#3b82f6" opacity="0.5"/>

    <!-- Cargo area separator -->
    <line x1="145" y1="75" x2="145" y2="155" stroke="#2563eb" stroke-width="3"/>

    <!-- Side window -->
    <rect x="155" y="75" width="90" height="45" rx="3" fill="#3b82f6" opacity="0.5"/>

    <!-- Front wheel -->
    <circle cx="80" cy="160" r="28" fill="#1f2937"/>
    <circle cx="80" cy="160" r="16" fill="#4b5563"/>
    <circle cx="80" cy="160" r="7" fill="#9ca3af"/>

    <!-- Rear wheel -->
    <circle cx="220" cy="160" r="28" fill="#1f2937"/>
    <circle cx="220" cy="160" r="16" fill="#4b5563"/>
    <circle cx="220" cy="160" r="7" fill="#9ca3af"/>

    <!-- Speed lines -->
    <line x1="270" y1="85" x2="290" y2="85" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <line x1="270" y1="105" x2="285" y2="105" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <line x1="270" y1="125" x2="288" y2="125" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
