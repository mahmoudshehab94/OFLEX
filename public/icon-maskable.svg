<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background - full bleed for maskable -->
  <rect width="512" height="512" fill="#1e293b"/>

  <!-- Stylized truck icon (scaled for safe zone) -->
  <g transform="translate(100, 165)">
    <!-- Main truck body -->
    <g>
      <!-- Cargo container -->
      <rect x="80" y="70" width="200" height="110" rx="6" fill="#3b82f6"/>

      <!-- Cabin -->
      <path d="M 45 85 L 45 150 L 10 150 L 10 115 C 10 95 22 85 45 85 Z" fill="#2563eb"/>

      <!-- Cabin to cargo connector -->
      <rect x="45" y="85" width="38" height="95" fill="#2563eb"/>

      <!-- Windshield -->
      <path d="M 40 98 L 40 130 L 18 130 L 18 110 C 18 102 25 98 40 98 Z" fill="#60a5fa" opacity="0.7"/>

      <!-- Door line on cabin -->
      <line x1="62" y1="110" x2="62" y2="165" stroke="#1e40af" stroke-width="2.5"/>

      <!-- Cargo door lines -->
      <line x1="180" y1="82" x2="180" y2="168" stroke="#1e40af" stroke-width="2.5"/>

      <!-- Side windows on cargo -->
      <rect x="95" y="85" width="65" height="40" rx="3" fill="#60a5fa" opacity="0.5"/>
      <rect x="200" y="85" width="65" height="40" rx="3" fill="#60a5fa" opacity="0.5"/>

      <!-- Front wheel -->
      <circle cx="70" cy="180" r="32" fill="#374151"/>
      <circle cx="70" cy="180" r="20" fill="#6b7280"/>
      <circle cx="70" cy="180" r="10" fill="#9ca3af"/>

      <!-- Rear wheel -->
      <circle cx="240" cy="180" r="32" fill="#374151"/>
      <circle cx="240" cy="180" r="20" fill="#6b7280"/>
      <circle cx="240" cy="180" r="10" fill="#9ca3af"/>

      <!-- Motion lines -->
      <line x1="290" y1="95" x2="310" y2="95" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
      <line x1="290" y1="120" x2="305" y2="120" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
      <line x1="290" y1="145" x2="308" y2="145" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>
</svg>
